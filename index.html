<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exponente Master v2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #6366f1; --docente: #8b5cf6; --estudiante: #10b981; --bg: #0f172a; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.1rem; color: white; }
        .hidden { display: none !important; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="screen-select" class="card">
        <h1>🚀 Bienvenidos</h1>
        <p>Selecciona tu rol para continuar:</p>
        <button class="btn" style="background: var(--estudiante);" onclick="showLogin('estudiante')">SOY ESTUDIANTE</button>
        <button class="btn" style="background: var(--docente);" onclick="showLogin('docente')">SOY DOCENTE</button>
    </div>

    <div id="screen-login-st" class="card hidden">
        <h2>Ingreso Estudiante</h2>
        <input type="text" id="st-nombre" placeholder="Nombre Completo">
        <input type="text" id="st-codigo" placeholder="Código Estudiantil">
        <button class="btn" style="background: var(--estudiante);" onclick="entrarEstudiante()">ENTRAR AL JUEGO</button>
        <button onclick="location.reload()" style="background:none; border:none; color:gray; cursor:pointer;">← Volver</button>
    </div>

    <div id="screen-login-doc" class="card hidden">
        <h2>Ingreso Docente</h2>
        <input type="password" id="doc-pass" placeholder="Clave Maestra">
        <button class="btn" style="background: var(--docente);" onclick="entrarDocente()">ACCEDER</button>
    </div>

    <div id="game-container"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzDNv8KYPhV3e1sxLMO1_XINXHkbQjUobPJprJeOq9tJCnnGw5inzWSdqCv7IOZd17bjQ/exec";
const MASTER_KEY = "PROFE123";
let user = { nombre: "", codigo: "", grupo: "" };
let esDocente = false;
let modoActual = "";

// --- NAVEGACIÓN ---
function showLogin(rol) {
    document.getElementById('screen-select').classList.add('hidden');
    if(rol === 'estudiante') document.getElementById('screen-login-st').classList.remove('hidden');
    else document.getElementById('screen-login-doc').classList.remove('hidden');
}

// --- LOGIN DOCENTE ---
function entrarDocente() {
    const pass = document.getElementById('doc-pass').value;
    if(pass === MASTER_KEY) {
        esDocente = true;
        document.getElementById('screen-login-doc').classList.add('hidden');
        renderDocenteUI();
    } else { alert("Clave incorrecta"); }
}

// --- LOGIN ESTUDIANTE ---
function entrarEstudiante() {
    user.nombre = document.getElementById('st-nombre').value.trim();
    user.codigo = document.getElementById('st-codigo').value.trim();
    if(!user.nombre || !user.codigo) return alert("Llena tus datos");

    document.getElementById('screen-login-st').classList.add('hidden');
    // Registro inicial
    fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action:"login", ...user}) });
    
    // Iniciar monitoreo del estado del juego
    setInterval(monitorearJuego, 3000);
}

// --- RENDERIZADO DOCENTE ---
function renderDocenteUI() {
    document.getElementById('game-container').innerHTML = `
        <div class="card">
            <h2 style="color:var(--docente)">Panel de Control</h2>
            <div id="qr-box"></div>
            <select id="sel-modo">
                <option value="Individual">Individual (Retos)</option>
                <option value="Grupal">Grupal (Castigo Colectivo)</option>
                <option value="Flash">Pregunta Flash (Rapidez)</option>
            </select>
            <input type="text" id="ans-master" placeholder="Respuesta Correcta">
            <button class="btn" style="background:var(--docente)" onclick="publicarReto()">PUBLICAR ACTIVIDAD</button>
        </div>`;
    new QRCode(document.getElementById("qr-box"), { text: window.location.href, width: 120, height: 120 });
}

function publicarReto() {
    const res = document.getElementById('ans-master').value;
    const mod = document.getElementById('sel-modo').value;
    fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action:"adminConfig", respuesta: res, modo: mod}) });
    alert("¡Actividad enviada!");
}

// --- MONITOREO ESTUDIANTE (TIEMPO REAL) ---
async function monitorearJuego() {
    if(esDocente) return;
    try {
        const resp = await fetch(`${API_URL}?action=getGameState&codigo=${user.codigo}`);
        const data = await resp.json();
        
        if(data.modo !== modoActual) {
            modoActual = data.modo;
            renderEstudianteUI(data.modo);
        }
        if(data.puntos !== undefined) {
            document.getElementById('st-pts').innerText = data.puntos;
        }
    } catch(e) { console.error("Sincronizando..."); }
}

function renderEstudianteUI(modo) {
    let contenido = `<h2>Modo: ${modo}</h2><div class="points-display" id="st-pts">0</div>`;
    
    if(modo === "Individual" || modo === "Grupal") {
        contenido += `
            <input type="text" id="st-ans" placeholder="Escribe tu respuesta">
            <button class="btn" style="background:var(--estudiante)" onclick="enviarRespuesta()">ENVIAR</button>`;
    } else if(modo === "Flash") {
        contenido += `
            <p>¡El primero que toque el botón gana!</p>
            <button class="btn" style="background:#f59e0b; height:150px; font-size:2rem;" onclick="enviarRespuesta('FLASH')">¡LO TENGO!</button>`;
    }
    
    document.getElementById('game-container').innerHTML = `<div class="card">${contenido}</div>`;
}

function enviarRespuesta(valorFlash) {
    const ans = valorFlash || document.getElementById('st-ans').value;
    fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action:"checkAnswer", ...user, intento: ans}) });
}

// --- SISTEMA DE 3 SEGUNDOS ---
let timerTrampa;
function iniciarTrampa() {
    if(esDocente || !user.codigo) return;
    timerTrampa = setTimeout(() => {
        document.getElementById('penalty-ui').style.display = 'flex';
        fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action:"penalizar", ...user}) });
    }, 3000);
}
document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") iniciarTrampa();
    else clearTimeout(timerTrampa);
});
    </script>
</body>
</html>
