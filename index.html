<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exponente Master Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --profe: #8b5cf6; --estudiante: #10b981; --trampa: #ef4444; --bg: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #1e293b; padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; color: white; transition: 0.2s; }
        .hidden { display: none !important; }
        #qr-box { background: white; padding: 10px; display: inline-block; margin: 15px; border-radius: 10px; }
        /* Pantalla de Penalización */
        .penalty-msg { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--trampa); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:9999; text-align: center; }
        /* Marcador de puntos */
        .points-display { font-size: 3rem; color: var(--estudiante); font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="login-box" class="card">
        <h2>🚀 Sistema de Exponentes</h2>
        <input type="text" id="nombre" placeholder="Nombre Estudiante">
        <input type="text" id="codigo" placeholder="Código Estudiantil">
        <input type="text" id="grupo" placeholder="Grupo (Opcional)">
        <button onclick="entrar()" style="background: #6366f1;">Iniciar Sesión</button>
    </div>

    <div id="teacher-ui" class="card hidden">
        <h2 style="color: var(--profe);">👨‍🏫 Consola Docente</h2>
        <div id="qr-box"></div>
        <select id="game-mode">
            <option value="Individual">Modo Individual</option>
            <option value="Grupal">Modo Grupal (Castigo Colectivo)</option>
        </select>
        <input type="text" id="ans-master" placeholder="Respuesta del Reto">
        <button onclick="configurarReto()" style="background: var(--profe);">PUBLICAR RETO</button>
    </div>

    <div id="student-ui" class="card hidden">
        <h2 id="st-name-display">Estudiante</h2>
        <div style="background: #334155; padding: 15px; border-radius: 15px;">
            <p style="margin:0; font-size: 0.8rem; color: #94a3b8;">TUS PUNTOS ACTUALES</p>
            <div id="current-points" class="points-display">0</div>
        </div>
        <input type="text" id="st-ans" placeholder="Tu respuesta">
        <button onclick="enviarRespuesta()" style="background: var(--estudiante);">VALIDAR RESPUESTA</button>
        <p id="st-msg" style="margin-top: 10px; font-size: 0.9rem;"></p>
    </div>

    <div id="penalty-ui" class="penalty-msg">
        <h1 style="font-size: 3rem;">⚠️ ¡TRAMPA!</h1>
        <p>Saliste del juego por más de 3 segundos.</p>
        <p>Se han descontado <b>50 puntos</b>.</p>
        <button onclick="cerrarPenalty()" style="background:white; color:red; width:200px;">VOLVER</button>
    </div>

    <script>
        // AQUÍ CONECTAMOS TU URL
        const API_URL = "https://script.google.com/macros/s/AKfycbxg886FogQXb5vvBcZWFn-nemdc40uMRyd0zhGZWOSKoHmoSO8MMXRraa4mQjjqQfE/exec";
        const MASTER_KEY = "PROFE123";
        let user = { nombre: "", codigo: "", grupo: "" };
        let esDocente = false;

        // Las funciones de lógica las pondremos en el Paso 3 para que no haya errores
    </script>
</body>
</html>
