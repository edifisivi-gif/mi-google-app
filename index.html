<!DOCTYPE html>
<html>
<head>
    <title>Control de Clase de Exponentes</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; transition: background 0.3s; }
        .hidden { display: none; }
        .penalizado { background-color: #ffcccc; color: red; }
    </style>
</head>
<body>

    <div id="login-section">
        <h2>Ingreso al Juego</h2>
        <input type="text" id="nombre" placeholder="Tu Nombre">
        <input type="text" id="codigo" placeholder="Código de Clase">
        <button onclick="login()">Entrar</button>
    </div>

    <div id="game-section" class="hidden">
        <h1 id="welcome"></h1>
        <p>¡No salgas de esta pestaña o serás penalizado!</p>
        </div>

    <script>
        const SCRIPT_URL = https://script.google.com/macros/s/AKfycbxA7ypoJD02Jo_wBsSmsgFHKt-Le-XWoYkj01avHt3gYQ0_OaKJUNajmxq9vdLtyb_hvw/exec;
        let usuarioActual = { nombre: "", codigo: "" };
        let estaLogueado = false;

        function login() {
          usuarioActual.nombre = document.getElementById('nombre').value;
          usuarioActual.codigo = document.getElementById('codigo').value;
          
          fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "login", ...usuarioActual })
          }).then(() => {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('game-section').classList.remove('hidden');
            document.getElementById('welcome').innerText = "Hola, " + usuarioActual.nombre;
            estaLogueado = true;
          });
        }

        // --- LÓGICA DE DETECCIÓN DE TRAMPA ---
        function penalizar() {
          if (!estaLogueado) return;
          
          document.body.classList.add('penalizado');
          alert("¡TRAMPA DETECTADA! Se te han restado puntos.");
          
          fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "penalizar", ...usuarioActual })
          });
        }

        // 1. Detecta si cambia de pestaña
        document.addEventListener("visibilitychange", () => {
          if (document.visibilityState === "hidden") {
            penalizar();
          }
        });

        // 2. Detecta si cambia de aplicación (pierde el foco)
        window.addEventListener("blur", () => {
          penalizar();
        });
    </script>
</body>
</html>
